@(userId: Long, username: String)

@main("Department Profiles", null) {

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <div class="container">
        <div class="row">
            <div class="col s12">
                <h3 class="center">Department Research Profiles</h3>
                <p class="center">Compare SMU departments by publications and funded projects.</p>
            </div>
        </div>

            <!-- Bar Chart -->
        <div class="row">
            <div class="col s12">
                <div class="card z-depth-1">
                    <div class="card-content">
                        <span class="card-title center">Publications vs Funded Projects (Last 3 Years)</span>
                        <canvas id="deptChart" height="100"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
            var ctx = document.getElementById('deptChart').getContext('2d');
            var deptChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Computer Science', 'Electrical Engineering', 'Mechanical Engineering', 'Civil Engineering', 'Data Science'],
                    datasets: [
                        {
                            label: 'Publications',
                            data: [45, 30, 25, 20, 35],
                            backgroundColor: 'rgba(54, 162, 235, 0.7)'
                        },
                        {
                            label: 'Funded Projects',
                            data: [12, 9, 8, 6, 10],
                            backgroundColor: 'rgba(255, 99, 132, 0.7)'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
    </script>

}
