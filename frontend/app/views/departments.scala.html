@(userId: Long, username: String)

@main("SMU Departments", null) {

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <div class="container">

        <!-- Title -->
        <div class="row">
            <div class="col s12">
                <h3 class="center">SMU Departments</h3>
                <p class="center">Explore SMU's research departments, faculty, and projects.</p>
            </div>
        </div>

        <!-- Search and Sort Bar -->
        <div class="row">
            <div class="col s12 m6">
                <div class="input-field">
                    <i class="material-icons prefix">search</i>
                    <input type="text" id="searchInput" onkeyup="filterDepartments()">
                    <label for="searchInput">Search Departments</label>
                </div>
            </div>
            <div class="col s12 m6">
                <div class="input-field">
                    <select id="sortSelect" onchange="sortDepartments()">
                        <option value="name">Sort by Name</option>
                        <option value="faculty">Sort by Faculty Count</option>
                        <option value="projects">Sort by Active Projects</option>
                        <option value="publications">Sort by Publications</option>
                    </select>
                    <label>Sort By</label>
                </div>
            </div>
        </div>

        <!-- Department Cards loaded by JS -->
        <div class="row" id="departmentCards">
            <div class="col s12 center">
                <p>Loading departments...</p>
            </div>
        </div>

        <!-- Bar Chart -->
        <div class="row">
            <div class="col s12">
                <div class="card z-depth-1">
                    <div class="card-content">
                        <span class="card-title center">Publications vs Funded Projects (Last 3 Years)</span>
                        <canvas id="deptChart" height="100"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Bar Chart setup
        var ctx = document.getElementById('deptChart').getContext('2d');
        var deptChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Publications',
                        data: [],
                        backgroundColor: 'rgba(54, 162, 235, 0.7)'
                    },
                    {
                        label: 'Funded Projects',
                        data: [],
                        backgroundColor: 'rgba(255, 99, 132, 0.7)'
                    }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        // Fetch real data from backend
        fetch('/department/departmentList')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                var departments = data.data || data;
                var container = document.getElementById('departmentCards');
                container.innerHTML = '';

                departments.forEach(function(dept) {
                    var keywords = dept.topKeywords ? dept.topKeywords.map(function(k) {
                        return '<span class="chip">' + k + '</span>';
                    }).join('') : '';

                    var card = '<div class="col s12 m6 l4 dept-card"' +
                        ' data-name="' + dept.name + '"' +
                        ' data-faculty="' + dept.facultyCount + '"' +
                        ' data-projects="' + dept.activeProjectCount + '"' +
                        ' data-publications="' + dept.publicationCountLast3Years + '">' +
                        '<div class="card hoverable">' +
                        '<div class="card-content">' +
                        '<span class="card-title">' + dept.name + '</span>' +
                        '<p><b>Faculty:</b> ' + dept.facultyCount + '</p>' +
                        '<p><b>Active Projects:</b> ' + dept.activeProjectCount + '</p>' +
                        '<p><b>Funded Projects:</b> ' + dept.fundedProjectCount + '</p>' +
                        '<p><b>Publications (Last 3 Years):</b> ' + dept.publicationCountLast3Years + '</p>' +
                        '<p><b>Top Keywords:</b></p>' + keywords +
                        '</div>' +
                        '<div class="card-action">' +
                        '<a href="/department/departmentDetail/' + encodeURIComponent(dept.name) + '">View Profile</a>' +
                        '</div></div></div>';

                    container.innerHTML += card;
                });

                // Update chart with real data
                deptChart.data.labels = departments.map(function(d) { return d.name; });
                deptChart.data.datasets[0].data = departments.map(function(d) { return d.publicationCountLast3Years; });
                deptChart.data.datasets[1].data = departments.map(function(d) { return d.fundedProjectCount; });
                deptChart.update();
            })
            .catch(function(error) {
                console.error('Error:', error);
                document.getElementById('departmentCards').innerHTML =
                    '<p class="center red-text">Error loading departments. Please try again.</p>';
            });

        // Filter
        function filterDepartments() {
            var input = document.getElementById("searchInput").value.toLowerCase();
            var cards = document.querySelectorAll(".dept-card");
            cards.forEach(function(card) {
                var name = card.getAttribute("data-name").toLowerCase();
                if (name.includes(input)) {
                    card.style.display = "";
                } else {
                    card.style.display = "none";
                }
            });
        }

        // Sort
        function sortDepartments() {
            var sortBy = document.getElementById("sortSelect").value;
            var container = document.getElementById("departmentCards");
            var cards = Array.from(document.querySelectorAll(".dept-card"));

            cards.sort(function(a, b) {
                if (sortBy === "name") {
                    return a.getAttribute("data-name").localeCompare(b.getAttribute("data-name"));
                } else if (sortBy === "faculty") {
                    return b.getAttribute("data-faculty") - a.getAttribute("data-faculty");
                } else if (sortBy === "projects") {
                    return b.getAttribute("data-projects") - a.getAttribute("data-projects");
                } else if (sortBy === "publications") {
                    return b.getAttribute("data-publications") - a.getAttribute("data-publications");
                }
            });

            cards.forEach(function(card) {
                container.appendChild(card);
            });
        }
    </script>

}
