# Default backend configuration.
# CI uses environment variables (DB_URL, DB_USERNAME, DB_PASSWORD) set in the workflow.
# Local development: create conf/application.local.conf with your MySQL settings.

play.http.secret.key = "scihub-dev-default-key"
play.http.secret.key = ${?PLAY_SECRET_KEY}

# Database — defaults to H2 in-memory; override via env vars for MySQL
db.default.driver   = org.h2.Driver
db.default.url      = "jdbc:h2:mem:play;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
db.default.username = ""
db.default.password = ""

db.default.driver   = ${?DB_DRIVER}
db.default.url      = ${?DB_URL}
db.default.username = ${?DB_USERNAME}
db.default.password = ${?DB_PASSWORD}

# Ebean — manage all models in the models package
ebean.default = ["models.*"]

# Auto-apply DB evolutions (CI and dev; disable in production)
play.evolutions.db.default.autoApply = true

# Optional local overrides (silently ignored if the file does not exist)
include "application.local.conf"
