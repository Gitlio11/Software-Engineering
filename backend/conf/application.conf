# Backend configuration.
# CI uses H2 in-memory (MySQL-compatibility mode) — no external DB needed.
# Local MySQL: create conf/application.local.conf with your db.default settings.

play.http.secret.key = "scihub-dev-default-key"
play.http.secret.key = ${?PLAY_SECRET_KEY}

# H2 in-memory database — MySQL mode so the existing evolutions work as-is
db.default.driver   = org.h2.Driver
db.default.url      = "jdbc:h2:mem:play;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
db.default.username = ""
db.default.password = ""

# Ebean — manage all models in the models package
ebean.default = ["models.*"]

# Auto-apply evolutions on startup
play.evolutions.db.default.autoApply = true

# AWS config — real credentials go in application.local.conf; dummy values satisfy
# Constants.java static initializers so fakeApplication() works in CI without S3.
aws.s3.bucketName   = "ci-test-bucket"
aws.fileNamePrefix  = "ci-test-"
aws.accessKeyId     = "ci-test-key"
aws.secretAccessKey = "ci-test-secret"
aws.region          = "us-east-1"

# Optional local overrides — silently ignored if absent (do NOT use required())
include "application.local.conf"
