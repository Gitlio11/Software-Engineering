name: Run Backend Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  test:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_pw
          MYSQL_DATABASE: scihub_test
          MYSQL_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root --password=ci_root_pw --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 8 with sbt
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Install sbt
        run: |
          curl -fL https://github.com/sbt/sbt/releases/download/v1.9.9/sbt-1.9.9.tgz | sudo tar xz -C /usr/local
          echo "/usr/local/sbt/bin" >> $GITHUB_PATH

      - name: Wait for MySQL and verify connectivity
        run: |
          until mysql -h 127.0.0.1 -u root -pci_root_pw -e "SELECT 1" scihub_test; do
            echo "MySQL not yet ready, retrying in 3s..."
            sleep 3
          done
          echo "MySQL is ready."

      - name: Cache Ivy and sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('backend/build.sbt', 'backend/project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Compile backend
        run: sbt clean compile
        working-directory: ./backend

      - name: Run all backend tests
        run: sbt test
        working-directory: ./backend
        env:
          PLAY_SECRET_KEY: ci-test-secret-key
          DB_DRIVER: com.mysql.cj.jdbc.Driver
          DB_URL: "jdbc:mysql://127.0.0.1:3306/scihub_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
          DB_USERNAME: root
          DB_PASSWORD: ci_root_pw

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: backend/target/test-reports/
