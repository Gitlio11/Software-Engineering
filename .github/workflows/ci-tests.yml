name: Run Backend Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  test:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 8
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '8'

      - name: Cache sbt dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('backend/build.sbt', 'backend/project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Compile backend
        run: sbt clean compile
        working-directory: ./backend

      - name: Run all backend tests
        run: sbt test
        working-directory: ./backend
        env:
          # Play uses H2 in-memory DB for fakeApplication() — no external DB needed
          PLAY_SECRET_KEY: ci-test-secret-key

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: backend/target/test-reports/
